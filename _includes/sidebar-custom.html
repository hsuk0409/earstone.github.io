<nav class="nav__list">
  <input id="ac-toc" name="accordion-toc" type="checkbox" />
  <label for="ac-toc" style="cursor: default;">카테고리</label>
  <ul class="nav__items">
    {% for category in site.categories %}
      <li>
        <span class="nav__sub-title" style="margin-bottom: 0.5em; display: block; border-bottom: 1px solid #f2f3f3;">
          {{ category[0] }} ({{ category[1].size }})
        </span>
      </li>
    {% endfor %}
  </ul>
</nav>
